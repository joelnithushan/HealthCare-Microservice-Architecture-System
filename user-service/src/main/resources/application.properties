server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT — secret must be >= 32 bytes; service refuses to start otherwise.
jwt.secret=${JWT_SECRET}
jwt.access-ttl-ms=${JWT_ACCESS_TOKEN_TTL_MS:86400000}
jwt.refresh-ttl-ms=${JWT_REFRESH_TOKEN_TTL_MS:604800000}

# File upload limits (defence-in-depth; stricter checks run in controllers).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Google Sign-In. Leave empty to disable SSO — UserService returns a clear error.
google.client.id=${GOOGLE_CLIENT_ID:}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# SMTP (Gmail). Never commit real credentials — pull from environment.
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
