server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # User Service
        - id: user-service-v1
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=2
        - id: user-service-direct
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service

        # Doctor Service
        - id: doctor-service-v1
          uri: http://${DOCTOR_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/doctors/**
          filters:
            - StripPrefix=2
        - id: doctor-service-direct
          uri: http://${DOCTOR_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: doctorServiceCB
                fallbackUri: forward:/fallback/doctor-service

        # Appointment Service
        - id: appointment-service-v1
          uri: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/appointments/**
          filters:
            - StripPrefix=2
        - id: appointment-service-direct
          uri: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: appointmentServiceCB
                fallbackUri: forward:/fallback/appointment-service

        # Notification Service
        - id: notification-service-direct
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification-service

        - id: notification-websocket
          uri: ws://${NOTIFICATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/ws/**


        # Payment Service
        - id: payment-service-v1
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2
        - id: payment-service-direct
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment-service

        # Prescription Service
        - id: prescription-service-direct
          uri: http://${DOCTOR_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - StripPrefix=1

        # Telemedicine Service
        - id: telemedicine-service-v1
          uri: http://${TELEMEDICINE_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/telemedicine/**
          filters:
            - StripPrefix=2
        - id: sessions-service-direct
          uri: http://${TELEMEDICINE_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/sessions/**
          filters:
            - RewritePath=/api/sessions/(?<segment>.*), /telemedicine/sessions/${segment}
        - id: telemedicine-service-direct
          uri: http://${TELEMEDICINE_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/telemedicine/**
          filters:
            - StripPrefix=1

        # Symptom Checker Service
        - id: symptom-checker-service-v1
          uri: http://${SYMPTOM_CHECKER_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/v1/symptoms/**
          filters:
            - StripPrefix=2
        - id: symptom-checker-service-direct
          uri: http://${SYMPTOM_CHECKER_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/symptoms/**
          filters:
            - StripPrefix=1

        # Admin Routes
        - id: admin-user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/admin/users/**
          filters:
            - StripPrefix=1
        - id: admin-doctor-service
          uri: http://${DOCTOR_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/admin/doctors/**
          filters:
            - StripPrefix=1
        - id: admin-appointment-service
          uri: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/admin/appointments/**
          filters:
            - StripPrefix=1
        - id: admin-payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/admin/payments/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET}

# ─── Resilience4j Circuit Breaker Configuration ───
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      userServiceCB:
        baseConfig: default
      doctorServiceCB:
        baseConfig: default
      appointmentServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
      paymentServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 4s

# ─── Actuator Endpoints ───
management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true
