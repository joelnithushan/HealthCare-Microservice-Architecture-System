server.port=8085

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

# Stripe Configuration. Never commit real keys — ship only test placeholders.
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.currency=usd

# PayHere Configuration
payhere.merchant.id=${PAYHERE_MERCHANT_ID:1235381}
payhere.merchant.secret=${PAYHERE_MERCHANT_SECRET:}
