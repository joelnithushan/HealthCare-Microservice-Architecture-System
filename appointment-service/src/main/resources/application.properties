server.port=8083

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appointment_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:}

user.service.base-url=${USER_SERVICE_URL:http://localhost:8081}
doctor.service.base-url=${DOCTOR_SERVICE_URL:http://localhost:8082}
notification.service.base-url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}
