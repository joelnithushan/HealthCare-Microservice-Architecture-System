apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_HOST
              value: "user-service"
            - name: DOCTOR_SERVICE_HOST
              value: "doctor-service"
            - name: APPOINTMENT_SERVICE_HOST
              value: "appointment-service"
            - name: NOTIFICATION_SERVICE_HOST
              value: "notification-service"
            - name: PAYMENT_SERVICE_HOST
              value: "payment-service"
            - name: TELEMEDICINE_SERVICE_HOST
              value: "telemedicine-service"
            - name: SYMPTOM_CHECKER_SERVICE_HOST
              value: "symptom-checker-service"
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secret
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
